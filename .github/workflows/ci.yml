name: iOS CI

on:
  push:
    branches:
      - main
      - codex/**
  pull_request:

jobs:
  build-and-test:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode
        run: xcodebuild -version

      - name: Build
        run: |
          xcodebuild \
            -project CamperReady.xcodeproj \
            -scheme CamperReady \
            -destination 'generic/platform=iOS Simulator' \
            build

      - name: Test
        run: |
          xcodebuild \
            -project CamperReady.xcodeproj \
            -scheme CamperReady \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            test
